name: CI and Docs Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests and verify
        run: mvn clean verify

      - name: Generate JaCoCo report
        run: mvn jacoco:report

      - name: Generate Javadoc
        run: mvn javadoc:javadoc

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            backend/target/site/jacoco
            backend/target/reports/apidocs
            backend/target/generated-docs/openapi.json

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-reports
          path: downloaded

      - name: Prepare site
        run: |
          mkdir -p site
          mkdir -p site/jacoco
          mkdir -p site/javadoc
          mkdir -p site/swagger
          mkdir -p site/diagram

          cp -r downloaded/site/jacoco/* site/jacoco/ || true
          cp -r downloaded/reports/apidocs/* site/javadoc/ || true
          
          OPENAPI_FILE=$(find downloaded -name openapi.json | head -n 1)
          if [ -n "$OPENAPI_FILE" ]; then
            cp "$OPENAPI_FILE" site/swagger/openapi.json
          fi

          cp backend/src/main/resources/static/fullStackKlasse.png site/diagram/fullStackKlasse.png || true

          cat > site/swagger/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Swagger UI</title>
            <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
            <style>
              body { margin: 0; background: #fafafa; }
            </style>
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
            <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>
            <script>
              window.onload = () => {
                window.ui = SwaggerUIBundle({
                  url: './openapi.json',
                  dom_id: '#swagger-ui',
                  deepLinking: true,
                  presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                  ],
                  layout: "StandaloneLayout"
                });
              };
            </script>
          </body>
          </html>
          EOF

          cat > site/diagram/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Class Diagram</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 2rem;
              }
              img {
                max-width: 100%;
                height: auto;
                border: 1px solid #ccc;
              }
            </style>
          </head>
          <body>
            <h1>Class Diagram</h1>
            <p><a href="../index.html">Back to documentation</a></p>
            <img src="./fullStackKlasse.png" alt="Diagram">
          </body>
          </html>
          EOF

          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Project Documentation</title>
          </head>
          <body>
            <h1>Project Documentation</h1>
            <ul>
              <li><a href="./swagger/index.html">Swagger</a></li>
              <li><a href="./jacoco/index.html">JaCoCo Coverage Report</a></li>
              <li><a href="./javadoc/index.html">Javadoc</a></li>
              <li><a href="./diagram/index.html">Diagram</a></li>
            </ul>
          </body>
          </html>
          EOF

          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4